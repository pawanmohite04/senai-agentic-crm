services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: senai
      POSTGRES_PASSWORD: senai
      POSTGRES_DB: senai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://senai:senai@postgres:5432/senai
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OFFLINE_MODE: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - chroma

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://senai:senai@postgres:5432/senai
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
